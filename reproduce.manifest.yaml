  - id: eval-analyst
    label: AnalystAgent Evaluation
    phase: eval
    kind: eval_probe
    status: run
    probes:
      - { type: can_import, module: mcp_server_phytomni }
      - { type: can_import, module: huggingface_hub }

  - id: eval-data
    label: DataAgent Evaluation
    phase: eval
    kind: eval_probe
    status: run
    probes:
      - { type: file_exists, path: "DataAgent Evaluation/src/prompt_template.yaml" }
      - { type: can_import, module: langchain }
      - { type: file_contains_none, path: "DataAgent Evaluation/src/model/config.py", substring: "change_to_your_" }

  - id: eval-knowledge
    label: Knowledge&ReviewAgent Evaluation
    phase: eval
    kind: eval_probe
    status: run
    probes:
      - { type: file_exists, path: "Knowledge&ReviewAgent Evaluation/evaluation_id.py" }
      - { type: note_requires, message: "CLI requires --input dataset not shipped in this repo" }

  - id: eval-expert
    label: DeepGenomeAgent Evaluation
    phase: eval
    kind: eval_probe
    status: run
    probes:
      - { type: file_exists, path: "DeepGenomeAgent Evaluation/score.tsv" }
