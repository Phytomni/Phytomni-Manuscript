# .github/workflows/reproduce.yml
name: reproduce-figures
on: [push, pull_request]

jobs:
  conda:
    name: conda env + figures
    runs-on: ubuntu-latest
    defaults:
      run:
        shell: bash -el {0}
    steps:
      - uses: actions/checkout@v4
      - uses: conda-incubator/setup-miniconda@v3
        with:
          environment-file: environment.yml
          activate-environment: phytomni-fig
      - name: Install ggradar (GitHub-only) + register R kernel
        run: |
          Rscript -e 'remotes::install_github("ricardo-bion/ggradar", upgrade="never")'
          Rscript -e 'IRkernel::installspec(user = TRUE)'
      - name: Reproduce all figures (smoke)
        run: bash reproduce.sh --check
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: figures-conda
          path: '**/output/**'
          if-no-files-found: ignore

  uv:
    name: uv.lock + figures
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
      - name: Sync Python env from committed lock
        run: uv sync --frozen
      - name: Check README matrix matches manifest
        run: |
          source .venv/bin/activate
          python -m scripts.render_reproduce_matrix --write-readme README.md
          git diff --exit-code README.md
      - uses: r-lib/actions/setup-r@v2
        with:
          r-version: 'release'
      - name: Install R packages + kernel + ggradar
        run: |
          Rscript -e 'install.packages(c("tidyverse","scales","treemapify","viridis","readxl","RColorBrewer","rmarkdown","remotes","IRkernel"), repos="https://cloud.r-project.org")'
          Rscript -e 'remotes::install_github("ricardo-bion/ggradar", upgrade="never")'
          Rscript -e 'IRkernel::installspec(user = TRUE)'
      - name: Reproduce all figures (smoke) in uv env
        run: |
          source .venv/bin/activate
          bash reproduce.sh --check
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: figures-uv
          path: '**/output/**'
          if-no-files-found: ignore
